# =============================================================================
# M&A Database + Analysis Tool — Configuration
# =============================================================================
# All weights, thresholds, and assumptions live here. Never hardcode numbers.
# =============================================================================

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  engine: "duckdb"
  path: "data/ma_database.duckdb"
  # Abstraction layer supports future switch to sqlite or postgres

# -----------------------------------------------------------------------------
# Seed data
# -----------------------------------------------------------------------------
seed:
  real_deals_path: "data/raw/real_deals.csv"
  target_real_count: 100            # aim for 80-120
  min_real_count: 80                # minimum acceptable
  target_synthetic_count: 300       # bring total to ~400-500
  synthetic_min: 200
  synthetic_max: 400

# -----------------------------------------------------------------------------
# Synthetic data generation parameters
# -----------------------------------------------------------------------------
synthetic:
  # Deal value distribution (millions USD, log-normal)
  deal_value:
    median: 2000.0
    min: 100.0
    max: 50000.0
    log_std: 1.2

  # Acquirer type split (must sum to 1.0)
  acquirer_type_weights:
    sponsor: 0.40
    strategic: 0.55
    consortium: 0.05

  # Deal type weights (must sum to 1.0)
  deal_type_weights:
    strategic_acquisition: 0.40
    lbo: 0.25
    merger: 0.15
    take_private: 0.12
    carve_out: 0.08

  # Deal status weights
  deal_status_weights:
    closed: 0.75
    announced: 0.10
    pending: 0.08
    terminated: 0.07

  # Year weights — heavier toward recent years
  year_range:
    start: 2016
    end: 2026
  year_recency_bias: 1.3            # multiplier per year closer to present

  # EV/EBITDA ranges by sector (mean, std)
  ev_to_ebitda_by_sector:
    Technology:
      mean: 15.0
      std: 3.0
    Healthcare:
      mean: 13.0
      std: 2.5
    Industrials:
      mean: 10.0
      std: 2.0
    Consumer Discretionary:
      mean: 11.0
      std: 2.5
    Consumer Staples:
      mean: 12.0
      std: 2.0
    Financials:
      mean: 10.0
      std: 2.5
    Energy:
      mean: 7.0
      std: 2.0
    Materials:
      mean: 8.5
      std: 2.0
    Real Estate:
      mean: 16.0
      std: 3.0
    Communication Services:
      mean: 12.0
      std: 3.0
    Utilities:
      mean: 10.0
      std: 1.5

  # EV/Revenue ranges by sector (mean, std)
  ev_to_revenue_by_sector:
    Technology:
      mean: 5.0
      std: 2.0
    Healthcare:
      mean: 4.0
      std: 1.5
    Industrials:
      mean: 1.8
      std: 0.8
    Consumer Discretionary:
      mean: 1.5
      std: 0.7
    Consumer Staples:
      mean: 2.0
      std: 0.8
    Financials:
      mean: 3.0
      std: 1.5
    Energy:
      mean: 1.5
      std: 0.8
    Materials:
      mean: 1.5
      std: 0.6
    Real Estate:
      mean: 5.0
      std: 2.0
    Communication Services:
      mean: 3.5
      std: 1.5
    Utilities:
      mean: 2.5
      std: 0.8

  # Premium paid for public targets (percentage points)
  premium:
    mean: 30.0
    std: 10.0
    min: 5.0
    max: 80.0
    # Only applied to target_status = "public"

  # Leverage multiple for LBO deals
  leverage:
    mean: 5.5
    std: 1.5
    min: 3.0
    max: 8.0

  # Probability that optional fields are populated (synthetic realism)
  field_fill_probability:
    closing_date: 0.75
    enterprise_value: 0.85
    equity_value: 0.60
    ev_to_ebitda: 0.70
    ev_to_revenue: 0.55
    premium_paid_pct: 0.40           # only for public targets
    leverage_multiple: 0.50          # only for LBO deals
    financing_structure_text: 0.30
    hostile_or_friendly: 0.50
    target_ebitda: 0.65
    target_revenue: 0.70
    target_ebitda_margin: 0.60

