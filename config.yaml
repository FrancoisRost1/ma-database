# -----------------------------------------------------------------------------
# Completeness scoring weights
# -----------------------------------------------------------------------------
# Philosophy: weight reflects analytical importance for M&A deal analysis.
# A deal missing financials (EV, EBITDA, revenue) should score lower than
# a deal missing process fields (hostile_or_friendly, notes).
#
# Change log:
# - Removed data_origin from Tier 1 (always filled, adds no signal)
# - Added enterprise_value, target_ebitda, target_revenue to Tier 2
#   (core financial data that matters for valuation analysis)
# -----------------------------------------------------------------------------
completeness:
  # Tier 1 — highest importance (weight 3.0)
  # Core deal identity fields that every record must have
  tier_1:
    weight: 3.0
    fields:
      - "announcement_date"
      - "acquirer_party_id"
      - "target_name"
      - "deal_type"
      - "sector_id"
      - "deal_value_usd"
      - "deal_status"

  # Tier 2 — major analytical value (weight 2.0)
  # Valuation, financial, and classification fields used in core analytics
  tier_2:
    weight: 2.0
    fields:
      - "ev_to_ebitda"
      - "ev_to_revenue"
      - "premium_paid_pct"
      - "acquirer_type"              # derived from party
      - "closing_date"
      - "geography"
      - "enterprise_value"           # core financial data
      - "target_ebitda"              # core financial data
      - "target_revenue"             # core financial data

  # Tier 3 — useful but secondary (weight 1.0)
  # Process, source, and enrichment fields
  tier_3:
    weight: 1.0
    fields:
      - "financing_structure_text"
      - "leverage_multiple"
      - "hostile_or_friendly"
      - "notes"
      - "source_url"
      - "sub_industry"

  # Quality thresholds
  thresholds:
    high: 80.0                # >= 80% → green
    medium: 50.0              # 50-79% → yellow
    low: 50.0                 # < 50% → red, flagged

# -----------------------------------------------------------------------------
# Confidence scoring (rule-based, Phase 1)
# -----------------------------------------------------------------------------
confidence:
  rules:
    real_with_source: 1.0     # data_origin=real AND source_url is not null
    real_without_source: 0.8  # data_origin=real AND source_url is null
    synthetic: 0.5            # data_origin=synthetic
  low_completeness_cap:
    threshold: 30.0           # completeness < 30%
    max_confidence: 0.3       # cap confidence at this value

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  theme: "dark"               # Bloomberg dark mode
  plotly_template: "plotly_dark"
  chart_height: 450
  chart_color_palette:
    - "#00D4AA"               # primary teal
    - "#FF6B6B"               # red accent
    - "#4ECDC4"               # secondary teal
    - "#45B7D1"               # blue accent
    - "#F7DC6F"               # gold
    - "#BB8FCE"               # purple
    - "#85C1E9"               # light blue
    - "#F0B27A"               # orange
    - "#82E0AA"               # green
    - "#F1948A"               # pink

  # Time granularity
  default_time_granularity: "annual"   # annual | quarterly
  allow_quarterly_toggle: true

  # Tabs
  tabs:
    - "Overview"
    - "Valuation"
    - "Market Activity"
    - "Sponsor Intelligence"
    - "Deal Explorer"
    - "Data Management"

# -----------------------------------------------------------------------------
# Global sidebar filters (defaults)
# -----------------------------------------------------------------------------
filters:
  date_range:
    start: 2016
    end: 2026
  sector: "all"
  sub_industry: "all"
  deal_type: "all"
  acquirer_type: "all"
  acquirer_name: "all"
  deal_status: "all"
  geography: "all"
  deal_value_min: 0.0         # millions USD
  deal_value_max: 999999.0    # effectively no cap
  data_origin: "all"          # real / synthetic / all
  completeness_min: 0.0       # 0 = show all deals

# -----------------------------------------------------------------------------
# Export
# -----------------------------------------------------------------------------
export:
  csv:
    enabled: true
    output_dir: "outputs"
  excel:
    enabled: true
    output_dir: "outputs"
    include_summary_sheet: true
    include_valuation_sheet: true
  pdf:
    enabled: false            # Phase 2

# -----------------------------------------------------------------------------
# M&A Market Snapshot (auto-generated memo)
# -----------------------------------------------------------------------------
snapshot:
  enabled: true
  # Memo covers: active sectors, valuation shifts, sponsor vs strategic mix,
  # top sponsors, completion rate, concentration patterns
  compare_prior_period: true  # compare current filters vs same-length prior period
  max_length_words: 400

# -----------------------------------------------------------------------------
# Validation rules
# -----------------------------------------------------------------------------
validation:
  required_fields:
    - "announcement_date"
    - "target_name"
    - "deal_type"
    - "deal_status"
    - "data_origin"
  deal_value_min: 0.0
  deal_value_max: 500000.0     # $500B cap for sanity
  ev_to_ebitda_min: 1.0
  ev_to_ebitda_max: 100.0
  ev_to_revenue_min: 0.1
  ev_to_revenue_max: 100.0
  premium_min: -50.0           # allow negative premiums (distressed)
  premium_max: 200.0
  leverage_min: 0.0
  leverage_max: 15.0

  # Duplicate detection
  duplicate_check_fields:
    - "announcement_date"
    - "acquirer_party_id"
    - "target_name"
  duplicate_date_tolerance_days: 30   # same acquirer + target within 30 days = likely dupe